# AnyStack Enterprise v1.5.0 CI
name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax Check
        shell: pwsh
        run: .\test-syntax.ps1
      - name: Build
        shell: pwsh
        run: .\build.ps1
      - name: Pester Tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          Invoke-Pester .\* -Recurse -CI -OutputFormat JUnitXml -OutputFile test-results.xml
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

